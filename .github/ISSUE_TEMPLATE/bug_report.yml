name: Bug report
description: Something in nock does not work as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. nock search ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: nock version
      description: Output of `nock version`
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options: [TUI, MCP server, search/resolve CLI, other]
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, arch, and (if relevant) AI provider configured.
