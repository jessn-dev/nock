name: Scorecard

# OpenSSF Scorecard: automated supply-chain / security-posture rating (pinned
# dependencies, branch protection, token permissions, signed releases, …).
# Results publish to the Security tab and power the README badge.

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "41 6 * * 1" # weekly
  workflow_dispatch:

# Top-level token is read-only; the analysis job elevates only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results for the badge (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true # required for the public badge
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
