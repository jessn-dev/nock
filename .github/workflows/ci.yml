name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash # consistent across OSes; avoids PowerShell arg-parsing quirks
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.txt
          fail_ci_if_error: false # don't fail the build on a Codecov upload hiccup
        # Public repo: tokenless upload. If Codecov later requires a token,
        # add CODECOV_TOKEN as a repo secret and reference it here.

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "Unformatted files:"; echo "$out"; exit 1; fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9 # v9 installs golangci-lint v2 (matches .golangci.yml schema)
        with:
          version: v2.12.2 # pinned: `latest` drifts and breaks CI when new linters land (e.g. staticcheck QF1012)
